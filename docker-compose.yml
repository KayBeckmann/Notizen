services:
  homepage:
    image: nginx:alpine
    ports:
      - "${HOMEPAGE_PORT:-80}:80"
    volumes:
      - ./homepage:/usr/share/nginx/html:ro
    restart: unless-stopped

  notizen-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: notizen-app:latest
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  notizen-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: notizen-backend:latest
    ports:
      - "${BACKEND_PORT:-3000}:8080"
    environment:
      - PORT=8080
      - DB_PATH=/app/data/sync.db
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  # Optional: Development mit Live-Reload
  notizen-dev:
    image: ghcr.io/cirruslabs/flutter:latest
    working_dir: /app
    volumes:
      - .:/app
      - flutter_pub_cache:/root/.pub-cache
    ports:
      - "${DEV_PORT:-8081}:8080"
    command: flutter run -d web-server --web-port=8080 --web-hostname=0.0.0.0
    profiles:
      - dev

volumes:
  flutter_pub_cache:
  backend_data:
