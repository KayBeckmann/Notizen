name: notizen
description: "Eine plattformübergreifende Notiz-App mit Material Design 3."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # iOS Icons
  cupertino_icons: ^1.0.8

  # Database (Drift)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # State Management (Riverpod)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI & Design (Material Design 3)
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.1.0

  # Markdown Editor
  flutter_markdown: ^0.7.4+3
  markdown: ^7.2.2
  url_launcher: ^6.3.1
  flutter_highlight: ^0.7.0

  # Utilities
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  intl: ^0.20.2
  home_widget: ^0.4.0
  window_manager: ^0.4.3

  # HTTP & Sync
  http: ^1.2.2

  # Sharing
  share_plus: ^10.1.4

  # Media (Audio & Images)
  record: ^6.0.0
  audioplayers: ^6.1.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  photo_view: ^0.15.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.3

  # Testing
  mocktail: ^1.0.4

  # App Icons
  flutter_launcher_icons: ^0.14.3

# Icon-Konfiguration
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon_1024.png"
    background_color: "#6750A4"
    theme_color: "#6750A4"
  windows:
    generate: true
    image_path: "assets/icons/app_icon_1024.png"
    icon_size: 256
  image_path: "assets/icons/app_icon_1024.png"
  adaptive_icon_background: "#6750A4"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter:
  uses-material-design: true
