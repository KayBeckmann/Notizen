name: notizen
description: "Eine plattformübergreifende Notiz-App mit Material Design 3."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # iOS Icons
  cupertino_icons: ^1.0.8

  # Database (Drift)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # State Management (Riverpod)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI & Design (Material Design 3)
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.1.0

  # Markdown Editor
  flutter_markdown: ^0.7.4+3
  markdown: ^7.2.2
  url_launcher: ^6.3.1
  flutter_highlight: ^0.7.0

  # Utilities
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.3

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
