<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Notizen App - Eine moderne Notiz-Anwendung">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Notizen">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Notizen</title>
  <link rel="manifest" href="manifest.json">

  <!-- sql.js für drift Web-Datenbank - lokale Dateien -->
  <script src="sql-wasm/sql-wasm.js"></script>
</head>
<body>
  <script>
    // sql.js initialisieren BEVOR Flutter startet
    var sqlPromise = initSqlJs({
      locateFile: file => `sql-wasm/${file}`
    });

    sqlPromise.then(function(SQL) {
      // SQL global verfügbar machen für drift
      window.SQL = SQL;
      console.log('sql.js erfolgreich geladen von lokalen Dateien');

      // Jetzt Flutter starten
      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    }).catch(function(err) {
      console.error('Fehler beim Laden von sql.js:', err);
      // Flutter trotzdem starten (mit Fehlermeldung in der App)
      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
